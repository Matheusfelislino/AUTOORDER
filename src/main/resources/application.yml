spring:
  application:
    name: autoorder

  datasource:
    url: jdbc:postgresql://localhost:5433/autoorder
    username: autoorder
    password: autoorder
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5673
    username: autoorder
    password: autoorder

  data:
    redis:
      host: localhost
      port: 6380

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] [trace_id=%X{traceId}] %-5level %logger{36} - %msg%n"

groq:
  api-url: https://api.groq.com/openai/v1/chat/completions
  api-key: ${GROQ_API_KEY}
  model: llama-3.3-70b-versatile
  connect-timeout-seconds: 5
  read-timeout-seconds: 30
